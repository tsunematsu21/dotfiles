#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
ratio = [1, 2, 2]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
sort_translit = true
linemode = "mtime"
show_hidden = true
show_symlink = true
scrolloff = 5

[preview]
wrap = "no"
tab_size = 2
image_delay = 50
image_filter = "triangle"
image_quality = 60

[input]
cursor_blink = true
