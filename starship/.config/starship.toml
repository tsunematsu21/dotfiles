"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_state\
$git_status\
$fill\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 2
truncate_to_repo = false
format = '[$path]($style) '
style = "cyan"
fish_style_pwd_dir_length = 5
use_logical_path = false

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"

[git_branch]
format = "on [ $branch]($style) "
style = "bold green"

[git_status]
style = "yellow"

[git_state]
style = "bright-black"

[fill]
symbol = " "

[cmd_duration]
min_time = 0
show_milliseconds = true
format = '[\($duration\)]($style) '
style = "bright-black"
